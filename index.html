<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Timmo's Acceleration Hub</title>
  <script src="https://unpkg.com/rss-parser@3.13.0/dist/rss-parser.min.js"></script>
  <style>
    body { 
      background: linear-gradient(135deg, #0a0a0a, #0f0f1a); color: #e0e0e0; font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; padding: 0; 
      display: flex; height: 100vh; overflow: hidden;
    }
    .sidebar {
      width: 280px; background: linear-gradient(to bottom, #111122, #0a0a1a); padding: 30px 20px 100px; border-right: 1px solid #1a1a2e; overflow-y: auto;
      box-shadow: 5px 0 20px rgba(0,0,0,0.7); position: relative;
    }
    .sidebar h1 {
      color: #60a5fa; text-align: center; margin-bottom: 40px; font-size: 1.7em; letter-spacing: 1.5px; text-shadow: 0 0 12px rgba(96,165,250,0.4);
    }
    .topic-btn {
      display: block; width: 100%; padding: 16px 20px; margin: 12px 0; background: #1a1a2e; border: none;
      border-radius: 14px; color: #d0d0ff; font-size: 1.08em; cursor: pointer; text-align: left;
      transition: all 0.35s ease; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
    }
    .topic-btn:hover, .topic-btn.active {
      background: linear-gradient(90deg, #1e3a8a, #3b82f6); color: white; box-shadow: 0 0 30px rgba(59,130,246,0.6); transform: translateX(10px) scale(1.03);
    }
    .clock {
      position: absolute; bottom: 20px; left: 20px; right: 20px; text-align: center; font-size: 1.1em; color: #a5b4fc;
      background: #1a1a2e88; padding: 10px; border-radius: 12px; backdrop-filter: blur(5px);
    }
    .content-wrapper {
      flex: 1; display: flex; overflow: hidden;
    }
    .main {
      flex: 2; padding: 40px 30px; overflow-y: auto; background: #0a0a0a; border-right: 1px solid #1a1a2e;
    }
    .main h2 { 
      color: #60a5fa; margin-bottom: 35px; font-size: 2.2em; text-shadow: 0 0 18px rgba(96,165,250,0.25);
    }
    .right-sidebar {
      flex: 1; padding: 40px 30px; overflow-y: auto; background: #0b0b15;
    }
    .right-sidebar h3 {
      color: #93c5fd; margin-bottom: 20px; font-size: 1.4em;
    }
    .right-card {
      background: #1e1e2e; padding: 15px; border-radius: 12px; margin-bottom: 15px; border-left: 4px solid #3b82f6;
    }
    .card {
      background: linear-gradient(145deg, #1e1e2e, #141422); padding: 22px; border-radius: 18px; border-left: 6px solid #3b82f6;
      transition: all 0.35s ease; max-width: 900px; width: fit-content; box-shadow: 0 8px 25px rgba(0,0,0,0.6); margin-bottom: 20px;
    }
    .card:hover {
      transform: translateY(-10px); box-shadow: 0 15px 35px rgba(59,130,246,0.4); border-left-color: #60a5fa;
    }
    .card a { 
      color: #93c5fd; text-decoration: none; font-weight: 600; font-size: 1.25em; display: block; margin-bottom: 10px;
    }
    .card a:hover { color: #dbeafe; text-decoration: underline; }
    .meta { color: #a5b4fc; font-size: 0.95em; margin: 8px 0; display: block; }
    .snippet { color: #c7d2fe; line-height: 1.6; font-size: 1.05em; }
    .loading, .error { color: #a0a0ff; font-style: italic; padding: 30px; font-size: 1.1em; }
    .error { color: #fca5a5; }
  </style>
</head>
<body>
  <div class="sidebar">
    <h1>Acceleration Hub 🚀🤖</h1>
    <button class="topic-btn active" data-topic="all">Alla ämnen</button>
    <button class="topic-btn" data-topic="longevity">e/acc & Longevity</button>
    <button class="topic-btn" data-topic="ai">AI & Robotics</button>
    <button class="topic-btn" data-topic="sport">Sport (Chelsea & PL)</button>
    <button class="topic-btn" data-topic="quantum">Quantum Physics</button>

    <div class="clock" id="clock">CET: --:-- | Datum: ----</div>
  </div>

  <div class="content-wrapper">
    <div class="main">
      <h2 id="current-topic">Välj ett ämne till vänster</h2>
      <div id="news-content">
        <p class="loading">Laddar färska uppdateringar... (refresh om det behövs)</p>
      </div>
    </div>

    <div class="right-sidebar">
      <h3>Senaste highlights</h3>
      <div id="highlights">
        <p class="loading">Laddar snabba uppdateringar...</p>
      </div>
    </div>
  </div>

  <script>
    const parser = new RSSParser();
    const feeds = {
      longevity: 'https://longevity.technology/feed/',
      ai: 'https://www.artificialintelligence-news.com/rss',
      sport: 'https://www.football.london/chelsea-fc/?service=rss',
      quantum: 'https://phys.org/rss-feed/physics-news/quantum-physics/'
    };

    function timeAgo(dateStr) {
      if (!dateStr) return '';
      const date = new Date(dateStr);
      const now = new Date();
      const diffMs = now - date;
      const diffMin = Math.floor(diffMs / 60000);
      const diffHr = Math.floor(diffMin / 60);
      const diffDay = Math.floor(diffHr / 24);

      if (diffDay > 0) return `för ${diffDay} dag${diffDay > 1 ? 'ar' : ''} sedan`;
      if (diffHr > 0) return `för ${diffHr} tim${diffHr > 1 ? 'mar' : ''} sedan`;
      if (diffMin > 0) return `för ${diffMin} min${diffMin > 1 ? 'uter' : ''} sedan`;
      return 'precis nu';
    }

    function updateClock() {
      const now = new Date();
      const cetOffset = 1 * 60; // CET UTC+1 (justera för DST om behövs)
      const cetTime = new Date(now.getTime() + cetOffset * 60000);
      const hours = cetTime.getUTCHours().toString().padStart(2, '0');
      const mins = cetTime.getUTCMinutes().toString().padStart(2, '0');
      const dateStr = cetTime.toLocaleDateString('sv-SE');
      document.getElementById('clock').innerHTML = `CET: ${hours}:${mins} | Datum: ${dateStr}`;
    }
    setInterval(updateClock, 1000);
    updateClock();

    async function fetchWithFallback(url) {
      const proxies = [
        'https://api.allorigins.win/raw?url=',
        'https://corsproxy.io/?',
        'https://test.cors.workers.dev/?',
        'https://codetabs.com/cors-proxy/cors-proxy.php?url=',
        'https://cors.bridged.cc/'
      ];
      for (let proxy of proxies) {
        try {
          let fullUrl = proxy + encodeURIComponent(url);
          if (proxy.includes('bridged')) fullUrl = proxy + url;
          const res = await fetch(fullUrl, { signal: AbortSignal.timeout(15000) });
          if (res.ok) return res;
        } catch {}
      }
      throw new Error('Ingen proxy funkade');
    }

    async function loadRSS(url, targetElement) {
      try {
        const res = await fetchWithFallback(url);
        const text = await res.text();
        const feed = await parser.parseString(text);

        let html = '';
        feed.items.slice(0, 8).forEach(item => {
          const pubDate = item.pubDate ? new Date(item.pubDate).toLocaleDateString('sv-SE') : 'Okänt datum';
          const ago = timeAgo(item.pubDate);
          const snippet = (item.contentSnippet || item.description || '').substring(0, 200) + (item.contentSnippet?.length > 200 ? '...' : '');
          html += `
            <div class="card">
              <a href="${item.link}" target="_blank">${item.title}</a>
              <span class="meta">Publicerad: ${pubDate} (${ago})</span>
              <p class="snippet">${snippet}</p>
            </div>`;
        });
        targetElement.innerHTML = html || '<p class="loading">Inga nyheter – refresh!</p>';
      } catch (e) {
        targetElement.innerHTML = '<p class="error">Laddning misslyckades – prova refresh!</p>';
      }
    }

    function loadTopic(topic) {
      const content = document.getElementById('news-content');
      const title = document.getElementById('current-topic');
      content.innerHTML = '<p class="loading">Laddar...</p>';

      if (topic === 'all') {
        title.textContent = 'Alla ämnen – Senaste nyheter';
        content.innerHTML = '';
        Object.keys(feeds).forEach(key => {
          const section = document.createElement('div');
          section.innerHTML = `<h3 style="color:#a0a0ff; margin:40px 0 20px; font-size:1.5em;">${key.charAt(0).toUpperCase() + key.slice(1)}</h3><div id="${key}-sub"></div>`;
          content.appendChild(section);
          loadRSS(feeds[key], document.getElementById(`${key}-sub`));
        });
      } else {
        title.textContent = topic.charAt(0).toUpperCase() + topic.slice(1);
        loadRSS(feeds[topic], content);
      }
    }

    document.querySelectorAll('.topic-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.topic-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        loadTopic(btn.dataset.topic);
      });
    });

    loadTopic('all');
  </script>
</body>
</html>
