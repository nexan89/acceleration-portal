<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Timmo's Acceleration Hub</title>
  <script src="https://unpkg.com/rss-parser@3.13.0/dist/rss-parser.min.js"></script>
  <style>
    body { 
      background: linear-gradient(135deg, #0a0a0a, #0f0f1a, #1a0033); color: #e0e0ff; font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; padding: 0; 
      display: flex; height: 100vh; overflow: hidden;
    }
    .sidebar {
      width: 280px; background: linear-gradient(to bottom, #111122, #0a0a1a, #1a0033); padding: 30px 20px 120px; border-right: 1px solid #2a2a4a; overflow-y: auto;
      box-shadow: 5px 0 25px rgba(0,0,0,0.8); position: relative;
    }
    .sidebar h1 {
      color: #7c3aed; text-align: center; margin-bottom: 40px; font-size: 1.8em; letter-spacing: 2px; text-shadow: 0 0 15px rgba(124,58,237,0.5);
    }
    .topic-btn {
      display: block; width: 100%; padding: 16px 20px; margin: 12px 0; background: #1a1a2e; border: none;
      border-radius: 16px; color: #d0d0ff; font-size: 1.1em; cursor: pointer; text-align: left;
      transition: all 0.4s ease; box-shadow: 0 4px 20px rgba(0,0,0,0.6);
    }
    .topic-btn:hover, .topic-btn.active {
      background: linear-gradient(90deg, #4c1d95, #7c3aed, #a78bfa); color: white; box-shadow: 0 0 35px rgba(124,58,237,0.7); transform: translateX(12px) scale(1.04);
    }
    .clock {
      position: absolute; bottom: 20px; left: 20px; right: 20px; text-align: center; font-size: 1.15em; color: #c4b5fd;
      background: #1a1a2e99; padding: 12px; border-radius: 14px; backdrop-filter: blur(8px); box-shadow: 0 0 20px rgba(124,58,237,0.3);
    }
    .content-wrapper {
      flex: 1; display: flex; overflow: hidden;
    }
    .main {
      flex: 3; padding: 40px 40px; overflow-y: auto; background: #0a0a0a;
    }
    .main h2 { 
      color: #a78bfa; margin-bottom: 40px; font-size: 2.4em; text-shadow: 0 0 20px rgba(167,139,250,0.3);
    }
    .right-sidebar {
      flex: 1.2; padding: 40px 30px; overflow-y: auto; background: linear-gradient(to bottom, #0b0b15, #1a0033);
      border-left: 1px solid #2a2a4a;
    }
    .right-sidebar h3 {
      color: #c4b5fd; margin-bottom: 25px; font-size: 1.5em; text-shadow: 0 0 10px rgba(196,181,253,0.4);
    }
    .highlight-card {
      background: #1e1e2e; padding: 16px; border-radius: 14px; margin-bottom: 18px; border-left: 5px solid #7c3aed;
      transition: all 0.3s; box-shadow: 0 6px 20px rgba(0,0,0,0.5);
    }
    .highlight-card:hover {
      transform: translateY(-5px); box-shadow: 0 10px 30px rgba(124,58,237,0.4);
    }
    .card {
      background: linear-gradient(145deg, #1e1e2e, #141422, #1a0033); padding: 24px; border-radius: 20px; border-left: 7px solid #7c3aed;
      transition: all 0.4s ease; max-width: 950px; width: fit-content; box-shadow: 0 10px 30px rgba(0,0,0,0.7); margin-bottom: 25px;
    }
    .card:hover {
      transform: translateY(-12px); box-shadow: 0 20px 40px rgba(124,58,237,0.5); border-left-color: #a78bfa;
    }
    .card a { 
      color: #c4b5fd; text-decoration: none; font-weight: 700; font-size: 1.3em; display: block; margin-bottom: 12px;
    }
    .card a:hover { color: #e0d7ff; text-decoration: underline; }
    .meta { color: #c4b5fd; font-size: 1em; margin: 10px 0; display: block; }
    .snippet { color: #d1d5ff; line-height: 1.65; font-size: 1.08em; }
    .loading, .error { color: #c4b5fd; font-style: italic; padding: 40px; font-size: 1.2em; }
    .error { color: #fca5a5; }
  </style>
</head>
<body>
  <div class="sidebar">
    <h1>Acceleration Hub 🚀🤖</h1>
    <button class="topic-btn active" data-topic="all">Alla ämnen</button>
    <button class="topic-btn" data-topic="longevity">e/acc & Longevity</button>
    <button class="topic-btn" data-topic="ai">AI & Robotics</button>
    <button class="topic-btn" data-topic="sport">Sport (Chelsea & PL)</button>
    <button class="topic-btn" data-topic="quantum">Quantum Physics</button>

    <div class="clock" id="clock">CET: --:-- | Din tid: --:--</div>
  </div>

  <div class="content-wrapper">
    <div class="main">
      <h2 id="current-topic">Välj ett ämne till vänster</h2>
      <div id="news-content">
        <p class="loading">Laddar färska uppdateringar...</p>
      </div>
    </div>

    <div class="right-sidebar">
      <h3>Senaste highlights (från alla)</h3>
      <div id="highlights">
        <p class="loading">Samlar snabba uppdateringar...</p>
      </div>
    </div>
  </div>

  <script>
    const parser = new RSSParser();
    const feeds = {
      longevity: 'https://longevity.technology/feed/',
      ai: 'https://www.artificialintelligence-news.com/rss',
      sport: 'https://www.football.london/chelsea-fc/?service=rss',
      quantum: 'https://phys.org/rss-feed/physics-news/quantum-physics/'
    };

    function timeAgo(dateStr) {
      if (!dateStr) return '';
      const date = new Date(dateStr);
      const now = new Date();
      const diffMs = now - date;
      const diffMin = Math.floor(diffMs / 60000);
      const diffHr = Math.floor(diffMin / 60);
      const diffDay = Math.floor(diffHr / 24);

      if (diffDay > 0) return `för ${diffDay} dag${diffDay > 1 ? 'ar' : ''} sedan`;
      if (diffHr > 0) return `för ${diffHr} tim${diffHr > 1 ? 'mar' : ''} sedan`;
      if (diffMin > 0) return `för ${diffMin} min${diffMin > 1 ? 'uter' : ''} sedan`;
      return 'precis nu';
    }

    function updateClock() {
      const now = new Date();
      const cet = new Date(now.getTime() + 60*60*1000); // CET UTC+1 (ignorera DST för enkelhet)
      const hours = cet.getUTCHours().toString().padStart(2, '0');
      const mins = cet.getUTCMinutes().toString().padStart(2, '0');
      const dateStr = cet.toLocaleDateString('sv-SE');
      const localHours = now.getHours().toString().padStart(2, '0');
      const localMins = now.getMinutes().toString().padStart(2, '0');
      document.getElementById('clock').innerHTML = `CET: ${hours}:${mins} | Din tid: ${localHours}:${localMins}`;
    }
    setInterval(updateClock, 1000);
    updateClock();

    async function fetchWithFallback(url) {
      const proxies = [
        'https://api.allorigins.win/raw?url=',
        'https://corsproxy.io/?',
        'https://test.cors.workers.dev/?',
        'https://codetabs.com/cors-proxy/cors-proxy.php?url=',
        'https://cors.bridged.cc/'
      ];
      for (let proxy of proxies) {
        try {
          let fullUrl = proxy + encodeURIComponent(url);
          if (proxy.includes('bridged')) fullUrl = proxy + url;
          const res = await fetch(fullUrl, { signal: AbortSignal.timeout(15000) });
          if (res.ok) return res;
        } catch {}
      }
      throw new Error('Ingen proxy funkade');
    }

    async function loadRSS(url, targetElement) {
      try {
        const res = await fetchWithFallback(url);
        const text = await res.text();
        const feed = await parser.parseString(text);

        let html = '';
        feed.items.slice(0, 8).forEach(item => {
          const pubDate = item.pubDate ? new Date(item.pubDate).toLocaleDateString('sv-SE') : 'Okänt datum';
          const ago = timeAgo(item.pubDate);
          const snippet = (item.contentSnippet || item.description || '').substring(0, 220) + (item.contentSnippet?.length > 220 ? '...' : '');
          html += `
            <div class="card">
              <a href="${item.link}" target="_blank">${item.title}</a>
              <span class="meta">Publicerad: ${pubDate} (${ago})</span>
              <p class="snippet">${snippet}</p>
            </div>`;
        });
        targetElement.innerHTML = html || '<p class="loading">Inga nyheter – refresh!</p>';
      } catch (e) {
        targetElement.innerHTML = '<p class="error">Laddning misslyckades – prova refresh!</p>';
      }
    }

    function loadHighlights() {
      const highlights = document.getElementById('highlights');
      highlights.innerHTML = '<p class="loading">Samlar...</p>';
      let allItems = [];
      Object.keys(feeds).forEach(key => {
        fetchWithFallback(feeds[key]).then(res => res.text()).then(text => {
          parser.parseString(text).items.slice(0, 3).forEach(item => {
            allItems.push({ ...item, source: key });
          });
          allItems.sort((a,b) => new Date(b.pubDate) - new Date(a.pubDate));
          let html = '';
          allItems.slice(0, 5).forEach(item => {
            const ago = timeAgo(item.pubDate);
            html += `
              <div class="highlight-card">
                <a href="${item.link}" target="_blank">${item.title}</a>
                <span class="meta">[${item.source}] (${ago})</span>
              </div>`;
          });
          highlights.innerHTML = html || '<p>Inga highlights än.</p>';
        }).catch(() => {});
      });
    }

    function loadTopic(topic) {
      const content = document.getElementById('news-content');
      const title = document.getElementById('current-topic');
      content.innerHTML = '<p class="loading">Laddar...</p>';

      if (topic === 'all') {
        title.textContent = 'Alla ämnen – Senaste nyheter';
        content.innerHTML = '';
        Object.keys(feeds).forEach(key => {
          const section = document.createElement('div');
          section.innerHTML = `<h3 style="color:#c4b5fd; margin:45px 0 25px; font-size:1.6em;">${key.charAt(0).toUpperCase() + key.slice(1)}</h3><div id="${key}-sub"></div>`;
          content.appendChild(section);
          loadRSS(feeds[key], document.getElementById(`${key}-sub`));
        });
      } else {
        title.textContent = topic.charAt(0).toUpperCase() + topic.slice(1);
        loadRSS(feeds[topic], content);
      }
    }

    document.querySelectorAll('.topic-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.topic-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        loadTopic(btn.dataset.topic);
      });
    });

    // Auto-refresh feeds var 10 min
    setInterval(() => {
      loadTopic(document.querySelector('.topic-btn.active').dataset.topic);
      loadHighlights();
    }, 600000);

    loadTopic('all');
    loadHighlights();
  </script>
</body>
</html>
