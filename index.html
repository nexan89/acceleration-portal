<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Timmo's Acceleration Hub</title>
  <script src="https://unpkg.com/rss-parser@3.13.0/dist/rss-parser.min.js"></script>
  <style>
    body { background: #0a0a0a; color: #e0e0e0; font-family: Arial, sans-serif; margin: 0; padding: 20px; line-height: 1.5; }
    h1 { color: #00ffea; text-align: center; margin-bottom: 40px; }
    .section { background: #1a1a1a; border-radius: 12px; padding: 20px; margin: 30px 0; box-shadow: 0 4px 15px rgba(0, 255, 234, 0.1); }
    h2 { color: #00ffea; border-bottom: 2px solid #00ffea; padding-bottom: 10px; }
    .card { background: #222; padding: 15px; margin: 12px 0; border-radius: 8px; border-left: 5px solid #00ffea; transition: transform 0.2s; }
    .card:hover { transform: translateY(-3px); }
    a { color: #00ffea; text-decoration: none; font-weight: bold; }
    a:hover { text-decoration: underline; }
    .date { color: #aaa; font-size: 0.9em; margin-top: 5px; }
    .loading { color: #888; font-style: italic; }
  </style>
</head>
<body>
  <h1>Timmo's Acceleration Hub 🚀🤖</h1>

  <div class="section">
    <h2>e/acc & Longevity</h2>
    <div id="longevity-news" class="loading">Laddar senaste nyheter...</div>
  </div>

  <div class="section">
    <h2>AI & Robotics</h2>
    <div id="ai-news" class="loading">Laddar...</div>
  </div>

  <div class="section">
    <h2>Sport (Chelsea & Premier League)</h2>
    <div id="sport-news" class="loading">Laddar transfers & matcher...</div>
  </div>

  <div class="section">
    <h2>Quantum Physics</h2>
    <div id="quantum-news" class="loading">Laddar breakthroughs...</div>
  </div>

  <script>
    const parser = new RSSParser();

    async function loadRSS(url, targetId) {
      try {
        // Ny proxy: corsproxy.io – ofta mer stabil för RSS
        const proxyUrl = 'https://corsproxy.io/?' + encodeURIComponent(url);
        const response = await fetch(proxyUrl);
        if (!response.ok) throw new Error('Proxy-fel');
        const text = await response.text();
        const feed = await parser.parseString(text);
        
        let html = '';
        feed.items.slice(0, 6).forEach(item => {  // Upp till 6 senaste
          const date = item.pubDate ? new Date(item.pubDate).toLocaleDateString('sv-SE') : '';
          const snippet = item.contentSnippet || item.description || '';
          html += `
            <div class="card">
              <a href="${item.link}" target="_blank">${item.title}</a>
              <div class="date">${date}</div>
              <p>${snippet.substring(0, 120)}${snippet.length > 120 ? '...' : ''}</p>
            </div>`;
        });
        document.getElementById(targetId).innerHTML = html || '<p>Inga nyheter just nu – prova refresh!</p>';
      } catch (e) {
        document.getElementById(targetId).innerHTML = '<p style="color: #ff6b6b;">Kunde inte ladda – prova refresh eller senare!</p>';
      }
    }

    // Uppdaterade feeds – bra och fungerande källor
    loadRSS('https://longevity.technology/feed/', 'longevity-news');
    loadRSS('https://www.unite.ai/feed/', 'ai-news');
    loadRSS('https://www.football.london/chelsea-fc/?service=rss', 'sport-news');  // Chelsea-specifik från football.london
    loadRSS('https://phys.org/rss-feed/physics-news/quantum-physics/', 'quantum-news');

  </script>
</body>
</html>
