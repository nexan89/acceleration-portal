<!DOCTYPE html>
<script src="https://unpkg.com/rss-parser@3.13.0/dist/rss-parser.min.js"></script>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Timmo's Acceleration Hub</title>
  <style>
    body { background: #0a0a0a; color: #e0e0e0; font-family: Arial, sans-serif; margin: 0; padding: 20px; }
    h1 { color: #00ffea; text-align: center; }
    .section { background: #1a1a1a; border-radius: 10px; padding: 20px; margin: 20px 0; }
    .card { background: #222; padding: 15px; margin: 10px 0; border-radius: 8px; border-left: 4px solid #00ffea; }
    a { color: #00ffea; text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <h1>Välkommen till Acceleration Hub 🚀🤖</h1>
  
  <div class="section">
    <h2>e/acc & Longevity</h2>
    <div id="longevity-news">Laddar senaste nyheter...</div>
  </div>
  
  <div class="section">
    <h2>AI & Robotics</h2>
    <div id="ai-news">Laddar...</div>
  </div>
  <script>
  const parser = new RSSParser();
  
  async function loadRSS(url, targetId) {
    try {
      const feed = await parser.parseURL('https://api.allorigins.win/raw?url=' + encodeURIComponent(url));
      let html = '';
      feed.items.slice(0, 5).forEach(item => {  // Visa 5 senaste
        html += `<div class="card">
          <h3><a href="${item.link}" target="_blank">${item.title}</a></h3>
          <p>${item.pubDate || ''} - ${item.contentSnippet?.substring(0, 150) || ''}...</p>
        </div>`;
      });
      document.getElementById(targetId).innerHTML = html || 'Inga nyheter just nu.';
    } catch (e) {
      document.getElementById(targetId).innerHTML = 'Fel vid laddning – prova refresh!';
    }
  }
  
  // Exempel-feeds – byt till dina!
  loadRSS('https://longevity.technology/feed/', 'longevity-news');
  // loadRSS('annan-rss-url-här', 'ai-news');  // Lägg till fler
</script>
  <!-- Lägg till fler sektioner här senare, t.ex. Sport, Quantum -->
</body>
</html>
